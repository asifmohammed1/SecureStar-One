<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1 | Zero UI API Security</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        * { cursor: none; }
        body { background-color: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        
        .zero-btn {
            position: relative;
            padding: 2rem 5rem;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            z-index: 10;
        }
        .zero-btn:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.4);
            transform: scale(1.05);
        }
        
        .custom-cursor {
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            position: fixed; pointer-events: none;
            mix-blend-mode: difference; z-index: 1000;
            transition: transform 0.1s ease-out;
        }

        .spatial-text {
            letter-spacing: 1.5rem;
            text-indent: 1.5rem;
            opacity: 0.1;
            transition: all 1s ease;
        }
        
        /* Modal Styles */
        #scanner-modal {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90vw; height: 90vh;
            background: rgba(10,15,25,0.8);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            z-index: 100;
            visibility: hidden; opacity: 0;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #scanner-modal.active {
            visibility: visible; opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .close-btn {
            position: absolute; top: 20px; right: 30px;
            font-size: 2rem; opacity: 0.5; transition: 0.3s;
        }
        .close-btn:hover { opacity: 1; transform: rotate(90deg); }
        iframe { width: 100%; height: 100%; border: none; border-radius: 30px; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div id="canvas-container"></div>
    <div class="custom-cursor" id="cursor"></div>

    <div class="text-center">
        <h1 class="spatial-text text-8xl font-black mb-12">SECURESTAR ONE</h1>
        
        <div class="flex flex-col items-center gap-8">
            <button onclick="openModal()" class="zero-btn rounded-full group">
                <span class="text-xs tracking-[0.5rem] font-bold group-hover:text-blue-400 transition uppercase">Initialize Scanner</span>
            </button>
            <p class="text-[10px] uppercase tracking-widest opacity-30">Immersive Environment / S1-LABS</p>
        </div>
    </div>

    <!-- The Zero-UI Modal -->
    <div id="scanner-modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <iframe src="/ui"></iframe>
    </div>

    <script>
        function openModal() { document.getElementById('scanner-modal').classList.add('active'); }
        function closeModal() { document.getElementById('scanner-modal').classList.remove('active'); }
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(5000 * 3);
        for(let i=0; i < 5000 * 3; i++) { posArray[i] = (Math.random() - 0.5) * 5; }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({ size: 0.005, color: '#3b82f6' });
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);
        camera.position.z = 2;

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            renderer.render(scene, camera);
        }
        animate();

        // Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
